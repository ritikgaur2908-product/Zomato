<style>
        .loading-spinner {
            width: 64px;
            height: 64px;
            border: 4px solid var(--tw-colors-surface-variant);
            border-top-color: var(--tw-colors-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-step {
            transition: opacity 0.5s ease-in-out, transform 0.5s ease;
            opacity: 0.4;
            transform: translateY(4px);
        }
        .progress-step.active {
            opacity: 1;
            transform: translateY(0);
            color: var(--tw-colors-primary);
            font-weight: 600;
        }
        .progress-step.completed {
            opacity: 0.7;
            transform: translateY(0);
        }

        .ambient-shadow-sm {
            box-shadow: 0 4px 12px rgba(183, 18, 42, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .ambient-shadow-md {
            box-shadow: 0 12px 24px rgba(183, 18, 42, 0.08), 0 4px 8px rgba(0, 0, 0, 0.04);

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const steps = [
                document.getElementById('step-1'),
                document.getElementById('step-2'),
                document.getElementById('step-3')
            ];
            
            let currentStep = 0;

            function updateProgress() {
                steps.forEach((step, index) => {
                    if (index < currentStep) {
                        step.classList.remove('active');
                        step.classList.add('completed');
                    } else if (index === currentStep) {
                        step.classList.remove('completed');
                        step.classList.add('active');
                    } else {
                        step.classList.remove('active', 'completed');
                    }
                });

                currentStep++;
                if (currentStep > steps.length) {
                    currentStep = 0; 
                }
            }

            updateProgress();
            
            setInterval(updateProgress, 2000);
        });
    </script>
